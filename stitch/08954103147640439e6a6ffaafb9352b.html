<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RelaySwitch Lite - System Config</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&amp;family=JetBrains+Mono:wght@500&amp;family=Geist:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#810081",
                        "primary-container": "#00f3ff",
                        "inverse-surface": "#e2e2e8",
                        "tertiary-fixed": "#c3f400",
                        "on-secondary": "#5b005b",
                        "outline": "#849495",
                        "on-secondary-container": "#500050",
                        "secondary": "#ffabf3",
                        "primary-fixed-dim": "#00dce6",
                        "on-primary-container": "#006b71",
                        "tertiary-container": "#bded00",
                        "primary-fixed": "#6ff6ff",
                        "inverse-on-surface": "#2f3035",
                        "surface-container-lowest": "#0c0e12",
                        "outline-variant": "#3a494b",
                        "secondary-fixed-dim": "#ffabf3",
                        "surface-variant": "#333539",
                        "on-tertiary-fixed": "#161e00",
                        "inverse-primary": "#00696f",
                        "tertiary-fixed-dim": "#abd600",
                        "surface-dim": "#111318",
                        "surface-tint": "#00dce6",
                        "on-error": "#690005",
                        "secondary-fixed": "#ffd7f5",
                        "background": "#111318",
                        "surface-container-highest": "#333539",
                        "error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#3c4d00",
                        "on-surface-variant": "#b9cacb",
                        "on-primary": "#00373a",
                        "surface-container-low": "#1a1c20",
                        "error": "#ffb4ab",
                        "secondary-container": "#fe00fe",
                        "surface-container": "#1e2024",
                        "surface-container-high": "#282a2e",
                        "on-tertiary": "#283500",
                        "on-tertiary-container": "#526800",
                        "on-primary-fixed-variant": "#004f53",
                        "tertiary": "#f1ffc2",
                        "on-primary-fixed": "#002022",
                        "on-background": "#e2e2e8",
                        "primary": "#e3fdff",
                        "on-surface": "#e2e2e8",
                        "on-secondary-fixed": "#380038",
                        "surface-bright": "#37393e",
                        "on-error-container": "#ffdad6",
                        "surface": "#111318"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "path-width": "4px",
                        "relay-size": "32px",
                        "gutter": "8px",
                        "grid-unit": "40px",
                        "margin-edge": "24px"
                    },
                    fontFamily: {
                        "body-md": ["Geist"],
                        "data-label": ["JetBrains Mono"],
                        "hud-display-lg": ["Sora"],
                        "hazard-alert": ["Sora"],
                        "hud-display-sm": ["Sora"]
                    },
                    fontSize: {
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "data-label": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "500" }],
                        "hud-display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "hazard-alert": ["14px", { "lineHeight": "1.0", "letterSpacing": "0.2em", "fontWeight": "800" }],
                        "hud-display-sm": ["24px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .relay-bloom {
            box-shadow: 0 0 12px var(--tw-shadow-color);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 8px;
            background: #00f3ff;
            cursor: pointer;
            box-shadow: 0 0 8px #00f3ff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #1e2024;
            border: 1px solid #3a494b;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md h-screen w-screen overflow-hidden flex items-center justify-center relative">
<!-- Simulated Gameplay Background -->
<div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-20" data-alt="A dark, abstract representation of a futuristic circuit board or power grid. The scene features deep obsidian blacks illuminated by stark, geometric lines of neon cyan and magenta. The composition suggests high-speed data transfer or electrical current flowing through a complex network. The lighting is dramatic and moody, with a strong cyber-electric aesthetic typical of arcade-style interfaces."></div>
<!-- Grid Overlay -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(#00f3ff 1px, transparent 1px), linear-gradient(90deg, #00f3ff 1px, transparent 1px); background-size: 40px 40px;"></div>
<!-- Side NavBar (Hidden on mobile, present on desktop for navigation consistency) -->
<nav class="hidden md:flex flex-col fixed left-0 top-0 h-full z-40 pt-grid-unit w-64 bg-surface-container-lowest/90 backdrop-blur-xl border-r border-outline-variant">
<div class="px-margin-edge mb-8">
<h2 class="font-hazard-alert text-hazard-alert text-secondary">OPERATOR_01</h2>
<p class="font-data-label text-data-label text-tertiary-fixed-dim mt-1">VOLTAGE: 220V</p>
</div>
<ul class="flex flex-col gap-2">
<li>
<a class="flex items-center gap-4 px-margin-edge py-3 font-data-label text-data-label text-outline hover:text-on-surface-variant hover:bg-surface-variant/30 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
                    GRID_OS
                </a>
</li>
<li>
<a class="flex items-center gap-4 px-margin-edge py-3 font-data-label text-data-label text-outline hover:text-on-surface-variant hover:bg-surface-variant/30 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
                    POWER_STATS
                </a>
</li>
<li>
<a class="flex items-center gap-4 px-margin-edge py-3 font-data-label text-data-label text-outline hover:text-on-surface-variant hover:bg-surface-variant/30 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
                    OVERLOAD_LOGS
                </a>
</li>
<li>
<a class="flex items-center gap-4 px-margin-edge py-3 font-data-label text-data-label text-tertiary-container font-bold border-r-4 border-tertiary-container bg-tertiary-container/10 active-nav-item" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
                    SYSTEM_CFG
                </a>
</li>
</ul>
</nav>
<!-- Settings Overlay Canvas -->
<main class="relative z-50 w-full max-w-2xl mx-margin-edge bg-surface-container-low/80 backdrop-blur-md border border-primary-container/30 shadow-[0_0_24px_rgba(0,243,255,0.1)] flex flex-col md:ml-72">
<!-- Header -->
<header class="px-6 py-4 border-b border-primary-container/30 flex justify-between items-center bg-surface-container/50">
<div>
<h1 class="font-hud-display-sm text-hud-display-sm text-primary-container tracking-wider drop-shadow-[0_0_8px_rgba(0,243,255,0.5)]">SYSTEM_CFG</h1>
<p class="font-data-label text-data-label text-outline mt-1 uppercase">Parameters override sequence initiated</p>
</div>
<button class="text-outline hover:text-primary-container transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="close">close</span>
</button>
</header>
<!-- Content -->
<div class="p-6 overflow-y-auto max-h-[716px] flex flex-col gap-8">
<!-- Game Speed -->
<section class="space-y-4">
<div class="flex justify-between items-center">
<label class="font-data-label text-data-label text-tertiary-fixed-dim uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="speed">speed</span>
                        Cycle Rate (Speed)
                    </label>
<span class="font-data-label text-data-label text-primary-container">1.0x</span>
</div>
<input class="w-full focus:outline-none" max="2.0" min="0.5" step="0.1" type="range" value="1.0"/>
</section>
<!-- Difficulty -->
<section class="space-y-4">
<label class="font-data-label text-data-label text-tertiary-fixed-dim uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="warning">warning</span>
                    Threat Level (Difficulty)
                </label>
<div class="grid grid-cols-3 gap-2">
<button class="py-3 border border-outline-variant text-outline font-data-label text-data-label uppercase hover:bg-surface-variant hover:text-on-surface-variant transition-colors">Casual</button>
<button class="py-3 border border-primary-container bg-primary-container/10 text-primary-container font-data-label text-data-label uppercase relay-bloom shadow-primary-container">Normal</button>
<button class="py-3 border border-secondary-container text-secondary font-data-label text-data-label uppercase hover:bg-secondary-container hover:text-on-secondary-container transition-colors relative overflow-hidden group">
<span class="relative z-10">Overload</span>
<div class="absolute inset-0 bg-secondary-container/20 translate-y-full group-hover:translate-y-0 transition-transform"></div>
</button>
</div>
</section>
<!-- Audio -->
<section class="space-y-6">
<label class="font-data-label text-data-label text-tertiary-fixed-dim uppercase tracking-widest flex items-center gap-2 border-b border-outline-variant/50 pb-2">
<span class="material-symbols-outlined text-sm" data-icon="volume_up">volume_up</span>
                    Acoustics
                </label>
<div class="space-y-4">
<div>
<div class="flex justify-between items-center mb-2">
<span class="font-data-label text-data-label text-outline uppercase">Master Vol</span>
<span class="font-data-label text-data-label text-primary-container">80%</span>
</div>
<input class="w-full" max="100" min="0" type="range" value="80"/>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<span class="font-data-label text-data-label text-outline uppercase">SFX Gain</span>
<span class="font-data-label text-data-label text-primary-container">100%</span>
</div>
<input class="w-full" max="100" min="0" type="range" value="100"/>
</div>
</div>
</section>
<!-- Input Help -->
<section class="mt-4 p-4 border border-outline-variant bg-surface-container-highest/50">
<label class="font-data-label text-data-label text-tertiary-fixed-dim uppercase tracking-widest flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-sm" data-icon="keyboard">keyboard</span>
                    Input Matrix
                </label>
<div class="grid grid-cols-2 gap-4">
<div class="flex items-center gap-3">
<div class="flex gap-1">
<div class="w-8 h-8 border border-primary-container/50 flex items-center justify-center text-primary-container font-data-label bg-surface-container"><span class="material-symbols-outlined text-sm" data-icon="arrow_upward">arrow_upward</span></div>
<div class="w-8 h-8 border border-primary-container/50 flex items-center justify-center text-primary-container font-data-label bg-surface-container"><span class="material-symbols-outlined text-sm" data-icon="arrow_downward">arrow_downward</span></div>
</div>
<span class="font-data-label text-data-label text-outline uppercase">Route Energy</span>
</div>
<div class="flex items-center gap-3">
<div class="px-4 h-8 border border-tertiary-container/50 flex items-center justify-center text-tertiary-container font-data-label bg-surface-container">SPACE</div>
<span class="font-data-label text-data-label text-outline uppercase">Halt/Pause</span>
</div>
</div>
</section>
</div>
<!-- Actions -->
<footer class="p-6 border-t border-primary-container/30 bg-surface-container/80 flex justify-end gap-4">
<button class="px-6 py-3 border border-outline-variant text-outline font-data-label text-data-label uppercase hover:bg-surface-variant hover:text-on-surface-variant transition-colors">
                Cancel
            </button>
<button class="px-6 py-3 bg-primary-container text-on-primary-container font-data-label text-data-label font-bold uppercase hover:bg-primary-fixed hover:text-on-primary-fixed transition-colors relay-bloom shadow-primary-container">
                Apply Override
            </button>
</footer>
</main>
</body></html>
